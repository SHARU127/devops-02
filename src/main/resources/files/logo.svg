<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#1a1a2e" />

  <!-- Gear shape (DevOps symbol) -->
  <circle cx="50" cy="50" r="18" fill="none" stroke="#e94560" stroke-width="6"/>
  <circle cx="50" cy="50" r="7" fill="#e94560"/>

  <!-- Gear teeth -->
  <rect x="46" y="14" width="8" height="14" rx="3" fill="#e94560"/>
  <rect x="46" y="72" width="8" height="14" rx="3" fill="#e94560"/>
  <rect x="14" y="46" width="14" height="8" rx="3" fill="#e94560"/>
  <rect x="72" y="46" width="14" height="8" rx="3" fill="#e94560"/>

  <!-- Diagonal teeth -->
  <rect x="22" y="22" width="8" height="14" rx="3" fill="#e94560" transform="rotate(45 26 29)"/>
  <rect x="70" y="22" width="8" height="14" rx="3" fill="#e94560" transform="rotate(-45 74 29)"/>
  <rect x="22" y="64" width="8" height="14" rx="3" fill="#e94560" transform="rotate(-45 26 71)"/>
  <rect x="70" y="64" width="8" height="14" rx="3" fill="#e94560" transform="rotate(45 74 71)"/>
</svg>
